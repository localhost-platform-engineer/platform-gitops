apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/localhost-platform-engineer/platform-gitops
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true